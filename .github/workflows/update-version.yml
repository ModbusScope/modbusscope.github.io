name: Update version

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch latest release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release=$(gh api repos/ModbusScope/ModbusScope/releases/latest)
          tag=$(echo "$release"          | jq -r '.tag_name')
          html_url=$(echo "$release"     | jq -r '.html_url')
          published_at=$(echo "$release" | jq -r '.published_at')
          echo "tag=$tag"                   >> "$GITHUB_OUTPUT"
          echo "html_url=$html_url"         >> "$GITHUB_OUTPUT"
          echo "published_at=$published_at" >> "$GITHUB_OUTPUT"

      - name: Check if update is needed
        id: check
        run: |
          current=$(jq -r '.tag_name' updater/version.json)
          if [ "$current" != "${{ steps.release.outputs.tag }}" ]; then
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run update script
        if: steps.check.outputs.needs_update == 'true'
        run: |
          chmod +x scripts/update_version.sh
          ./scripts/update_version.sh \
            "${{ steps.release.outputs.tag }}" \
            "${{ steps.release.outputs.html_url }}" \
            "${{ steps.release.outputs.published_at }}"

      - name: Commit and open pull request
        if: steps.check.outputs.needs_update == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          new_tag="${{ steps.release.outputs.tag }}"
          branch="update-version-${new_tag}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add updater/version.json index.html
          git commit -m "Update version to ${new_tag}"
          git push -u origin "$branch"

          gh pr create \
            --title "Update version to ${new_tag}" \
            --body "Automated update: bumps all version references and \`updater/version.json\` to [${new_tag}](${{ steps.release.outputs.html_url }})." \
            --base main \
            --head "$branch"
